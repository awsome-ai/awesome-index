name: Build and Push Docker Image

on:
  push:
    branches: [main]
    paths:
      - 'server.js'
      - 'Dockerfile'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/awsome-ai/awesome-index:latest,ghcr.io/awsome-ai/awesome-index:${{ github.sha }}
